<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faragó Csaba</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2e1e4e, #4b3b6b, #6a4c93, #8e6bbd);
            background-size: 400% 400%;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            animation: backgroundAnimation 15s infinite alternate;
        }

        @keyframes backgroundAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            background: rgba(46, 30, 78, 0.8);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #d4bfff;
            margin-bottom: 20px;
        }

        .link-button {
            display: block;
            margin: 10px 0;
            padding: 20px;
            width: 200px;
            background: #4b3b6b;
            color: #d4bfff;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            text-align: center;
            font-size: 18px;
        }

        .link-button:hover {
            background: #d4bfff;
            color: #4b3b6b;
            box-shadow: 0 0 15px #d4bfff;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="https://www.instagram.com/frg.csaba/" class="link-button">Instagram</a>
        <a href="https://github.com/FCsab" class="link-button">GitHub</a>
        <a href="https://discordapp.com/users/873277922989985873" class="link-button">Discord</a>
        <a href="https://www.reddit.com/user/SodaKarate/" class="link-button">Reddit</a>
    </div>
</body>
</html>
